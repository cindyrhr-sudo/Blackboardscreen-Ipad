<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Klassenzimmer-Board">
    <link rel="apple-touch-icon" href="icon-180.png">
    <title>Klassenzimmer-Board 4.3 - iPad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400..700;1,400..700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <style>
        :root {
            --board-bg: #1a252f; --sidebar-bg: #161b22; --accent: #27ae60;
            --sidebar-w: clamp(50px, 7vw, 74px);
            --ui-zoom: 1;
            --geo-scale: 1;
            --grid-size: 30px;
        }
        * { box-sizing: border-box; font-family: 'Andika', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body {
            background-color: var(--board-bg); margin: 0; height: 100%; overscroll-behavior: none;
            touch-action: none; -webkit-touch-callout: none;
        }
        body { display: flex; height: 100vh; overflow: hidden; }

        #start-overlay {
            position: fixed; inset: 0; background: rgba(26, 37, 47, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; color: white; text-align: center; padding: 20px;
        }
        .start-btn {
            padding: 20px 40px; font-size: 24px; background: var(--accent);
            color: white; border: none; border-radius: 15px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.2s;
            margin-top: 20px;
        }
        .start-btn:active { transform: scale(0.96); }

        .side-panel {
            width: var(--sidebar-w); background: var(--sidebar-bg); display: flex; flex-direction: column;
            align-items: center; padding: clamp(6px, 1.4vw, 10px) 0; gap: clamp(4px, 1vw, 7px); z-index: 2000;
            flex-shrink: 0; -webkit-user-select: none; user-select: none; touch-action: none;
            zoom: var(--ui-zoom);
        }
        #sidebar { border-right: 2px solid rgba(255,255,255,0.1); }
        #sidebar-right { border-left: 2px solid rgba(255,255,255,0.1); }

        .side-btn {
            width: clamp(36px, 5.5vw, 50px); height: clamp(36px, 5.5vw, 50px);
            border-radius: clamp(9px, 1.8vw, 13px); border: none; cursor: pointer;
            font-size: clamp(15px, 2.8vw, 21px);
            color: white; display: flex; align-items: center; justify-content: center; transition: transform 0.15s;
            background: #33414f; flex-shrink: 0; -webkit-touch-callout: none;
        }
        .side-btn:active { transform: scale(0.93); }
        .side-btn.mode-active { background: var(--accent); box-shadow: 0 0 0 3px rgba(39,174,96,0.4); }
        .side-btn.tool-active { background: #2980b9; box-shadow: 0 0 0 3px rgba(41,128,185,0.4); }
        .btn-add { background: var(--accent); font-size: clamp(18px, 3.5vw, 26px); }
        .btn-save { background: #2980b9; font-size: clamp(14px, 2.5vw, 20px); }
        .btn-small { height: clamp(28px, 4.5vw, 36px); border-radius: clamp(7px, 1.4vw, 9px); font-size: clamp(11px, 2vw, 14px); font-weight: bold; }

        .sidebar-divider { width: 60%; height: 2px; background: rgba(255,255,255,0.12); margin: clamp(2px, 0.6vw, 3px) 0; flex-shrink: 0; }

        #color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(3px, 0.8vw, 5px); flex-shrink: 0; }
        .color-swatch { width: clamp(15px, 2.2vw, 20px); height: clamp(15px, 2.2vw, 20px); border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); }
        .color-swatch.active { border-color: white; box-shadow: 0 0 0 2px var(--accent); transform: scale(1.1); }

        #kindergarten { display: flex; flex-direction: column; gap: clamp(4px, 1vw, 7px); width: 100%; align-items: center; overflow-y: auto; flex: 1 1 0; min-height: 0; touch-action: pan-y; }
        .btn-parked {
            background: #4b5d67; border: 2px solid rgba(255,255,255,0.3); opacity: 0.5;
            width: clamp(32px, 5vw, 44px); height: clamp(32px, 5vw, 44px); font-size: clamp(13px, 2.2vw, 18px); position: relative;
        }
        .btn-parked.active { border-color: var(--accent); opacity: 1; box-shadow: 0 0 10px var(--accent); background: #5d6d7e; }
        .btn-parked.fullsize::after {
            content: '⛶'; position: absolute; top: -6px; right: -6px; background: #e67e22; color: white;
            border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center;
        }

        /* Mittlerer Bereich: Tafel + Seiten-Leiste */
        #workspace { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        #board-area { flex-grow: 1; position: relative; touch-action: none; overflow: hidden; min-height: 0; }

        #bg-pattern {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background-size: var(--grid-size) var(--grid-size);
        }
        #bg-pattern.bg-kariert {
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.18) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.18) 1px, transparent 1px);
        }
        #bg-pattern.bg-liniert {
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.22) 1px, transparent 1px);
            background-size: 100% var(--grid-size);
        }

        #tools-layer { position: absolute; inset: 0; z-index: 850; pointer-events: none; }
        .tool-el { position: absolute; pointer-events: auto; touch-action: none; -webkit-user-select: none; user-select: none; }
        .tool-el .rotatable { position: relative; transform: rotate(var(--rot, 0deg)); transform-origin: center center; }
        .geo-el .rotatable { transform: rotate(var(--rot, 0deg)) scale(var(--geo-scale, 1)); }
        .tool-drag, .tool-rotate-handle, .tool-del {
            position: absolute; width: 26px; height: 26px; border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 5;
            touch-action: none; -webkit-touch-callout: none; opacity: 0.75;
        }
        .tool-drag { background: rgba(0,0,0,0.55); cursor: move; top: -13px; left: -13px; }
        .tool-rotate-handle { background: #2980b9; cursor: grab; top: -13px; right: -13px; }
        .tool-del { background: #e74c3c; cursor: pointer; z-index: 6; bottom: -13px; left: -13px; }
        .ruler-svg, .geo-svg { display: block; pointer-events: none; }
        .geo-img { display: block; pointer-events: none; width: 340px; height: auto; -webkit-user-drag: none; user-select: none; }

        #text-layer { position: absolute; inset: 0; z-index: 5; pointer-events: none; -webkit-user-select: none; user-select: none; }
        .text-note { position: absolute; min-width: 30px; min-height: 30px; pointer-events: auto; }
        .note-content {
            outline: none; padding: 4px 10px; font-family: 'Andika', sans-serif;
            white-space: pre-wrap; min-width: 24px; line-height: 1.3; -webkit-user-select: text; user-select: text;
        }
        .note-handle, .note-delete {
            position: absolute; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 14px; color: white; opacity: 0.4; touch-action: none;
            -webkit-touch-callout: none; cursor: move;
        }
        .note-handle { top: -13px; left: -13px; background: rgba(0,0,0,0.55); }
        .note-delete { top: -13px; right: -13px; background: #e74c3c; cursor: pointer; }
        .text-note:focus-within .note-handle, .text-note:focus-within .note-delete { opacity: 0.9; }

        #board-canvas { position: absolute; inset: 0; z-index: 900; touch-action: none; pointer-events: none; -webkit-user-select: none; user-select: none; }
        #board-canvas.active { pointer-events: auto; }

        /* Seiten-Leiste (wie Tabellenblätter) */
        #page-tabs-vertical { display: flex; flex-direction: column; align-items: center; gap: clamp(4px, 1vw, 7px); width: 100%; flex: 1 1 0; min-height: 0; zoom: var(--ui-zoom); }
        #page-tabs-list { display: flex; flex-direction: column; gap: clamp(4px, 1vw, 6px); width: 100%; align-items: center; overflow-y: auto; flex-grow: 1; min-height: 0; touch-action: pan-y; }
        .page-tab {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
            background: #33414f; color: white; width: 90%; min-height: clamp(36px, 5.5vw, 46px); border-radius: 10px;
            cursor: pointer; font-size: clamp(10px, 1.6vw, 12px); padding: 4px 3px; text-align: center; position: relative;
            flex-shrink: 0; -webkit-touch-callout: none;
        }
        .page-tab.active { background: var(--accent); }
        .page-tab .tab-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
        .page-tab .tab-close {
            position: absolute; top: -6px; right: -6px; background: #e74c3c; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 12px; color: white;
        }
        #add-page-btn { width: 90%; font-size: clamp(10px, 1.6vw, 12px); }

        .widget { position: absolute; background: var(--w-bg); border-radius: clamp(9px, 1.6vw, 13px); box-shadow: 0 8px 28px rgba(0,0,0,0.5); display: flex; flex-direction: column; border: 2px solid var(--w-border); min-width: 220px; min-height: 160px; z-index: 10; overflow: hidden; }
        .widget.fullsize { top: 10px !important; left: 10px !important; width: calc(100% - 20px) !important; height: calc(100% - 20px) !important; z-index: 1500 !important; }
        .widget.theme-sepia { --w-bg: #fdf6e3; --w-text: #5f4b32; --w-header: #d3cbb3; --w-border: #c4ba9f; }
        .widget.theme-dark { --w-bg: #051a14; --w-text: #e0eee0; --w-header: #0a3d2e; --w-border: #0d4d3a; }
        .widget-header {
            background: var(--w-header); height: clamp(30px, 4.5vw, 40px); cursor: move; display: flex; justify-content: space-between;
            align-items: center; padding: 0 10px; color: white; font-size: clamp(13px, 2.2vw, 16px); flex-shrink: 0;
            touch-action: none; -webkit-user-select: none; user-select: none; zoom: var(--ui-zoom);
        }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .header-icon { cursor: pointer; font-size: clamp(14px, 2.4vw, 17px); -webkit-touch-callout: none; }
        .widget-content { padding: clamp(6px, 1.2vw, 10px); flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .settings-panel {
            display: none; background: rgba(0,0,0,0.05); padding: clamp(4px, 1vw, 7px); border-radius: 7px;
            margin-bottom: 6px; zoom: var(--ui-zoom);
        }
        .widget.show-settings .settings-panel { display: flex; flex-direction: column; gap: 4px; }
        select, .ctrl-btn { padding: 4px; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: white; height: clamp(26px, 4vw, 32px); min-width: clamp(26px, 4vw, 32px); font-size: clamp(11px, 1.8vw, 13px); }
        .img-display { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
        .timer-display { font-size: clamp(42px, 8vw, 72px); font-weight: bold; text-align: center; color: var(--w-text); margin: auto; -webkit-user-select: none; user-select: none; }
        .wheel-wrap { flex-grow: 1; display: flex; justify-content: center; align-items: center; min-height: 0; position: relative; overflow: hidden; }
        .wheel-canvas { width: auto; height: 90%; aspect-ratio: 1/1; max-width: 95%; object-fit: contain; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; }

        #menu { position: absolute; right: 80px; top: 16px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; z-index: 3000; width: 190px; border: 2px solid var(--accent); overflow: hidden; }
        #menu button { display: block; width: 100%; padding: 11px 14px; border: none; background: none; text-align: left; cursor: pointer; border-bottom: 1px solid #eee; font-size: 15px; -webkit-touch-callout: none; }
        #menu button:active { background: #f2f2f2; }

        /* Einstellungen-Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 4000; display: flex; align-items: center; justify-content: center; }
        .modal-overlay.hidden { display: none; }
        #settings-modal { background: var(--sidebar-bg); color: white; border-radius: 16px; width: min(380px, 88vw); max-height: 85vh; overflow-y: auto; overscroll-behavior: contain; touch-action: pan-y; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 2px solid var(--accent); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.15); font-size: 17px; }
        .modal-header .header-icon { font-size: 20px; }
        .modal-body { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 8px; touch-action: pan-y; }
        .modal-body h3 { margin: 8px 0 0; font-size: 12px; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.5px; }
        .settings-row { display: flex; align-items: center; gap: 10px; background: #33414f; color: white; border: none; border-radius: 10px; padding: 11px 14px; font-size: 15px; cursor: pointer; text-align: left; -webkit-touch-callout: none; }
        .settings-row:active { transform: scale(0.98); }
        .settings-row.bg-type-btn.mode-active { background: var(--accent); }
        .bg-type-row { display: flex; gap: 8px; }
        .bg-type-row .settings-row { flex: 1; justify-content: center; }
        .zoom-row { display: flex; flex-direction: column; gap: 6px; background: #33414f; border-radius: 10px; padding: 11px 14px; }
        .zoom-row label { font-size: 14px; display: flex; justify-content: space-between; }
        .zoom-row input[type=range] { width: 100%; }

        .flyout-menu {
            position: absolute; left: calc(var(--sidebar-w) + 10px); top: 68px; background: var(--sidebar-bg);
            border: 2px solid var(--accent); border-radius: 12px; padding: 10px; z-index: 2500;
            display: flex; flex-direction: column; gap: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .flyout-menu.hidden { display: none; }
        .flyout-title { color: white; font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
        .flyout-row { display: flex; gap: 8px; }
        .resizer { position: absolute; right: 0; bottom: 0; width: clamp(18px, 3vw, 24px); height: clamp(18px, 3vw, 24px); cursor: nwse-resize; z-index: 200; touch-action: none; }
        .hidden { display: none !important; }
        .winner-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; border-radius: 12px; }
        .alarm-stop-btn { background: #e74c3c !important; color: white !important; font-weight: bold; display: none; animation: blinker 1s linear infinite; margin-top: 10px; width: 100%; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1>Klassenzimmer-Board 4.3</h1>
    <p>Tippe auf den Button, um Ton &amp; Sprache zu aktivieren.</p>
    <button class="start-btn" onclick="initBoard()">Board aktivieren</button>
</div>

<div id="sidebar" class="side-panel">
    <button class="side-btn mode-active" id="mode-stift" onclick="setMode('stift')" title="Stift">✏️</button>
    <button class="side-btn" id="mode-linie" onclick="setMode('linie')" title="Gerade Linie">╱</button>
    <button class="side-btn" id="mode-text" onclick="onTextModeClick()" title="Text">🔤</button>
    <button class="side-btn" id="mode-hand" onclick="setMode('hand')" title="Bewegen">✋</button>

    <div class="sidebar-divider"></div>

    <button class="side-btn" onclick="createRuler()" title="Lineal einfügen">📏</button>
    <button class="side-btn" onclick="createGeoDreieck()" title="Geodreieck einfügen">📐</button>

    <div id="text-submenu" class="flyout-menu hidden">
        <div class="flyout-title">Text-Stil</div>
        <div class="flyout-row">
            <button class="side-btn btn-small" id="text-bold-btn" onclick="toggleTextBold()"><b>F</b></button>
            <button class="side-btn btn-small" id="text-italic-btn" onclick="toggleTextItalic()"><i>K</i></button>
        </div>
        <div class="flyout-title">Schriftgröße</div>
        <div class="flyout-row">
            <button class="side-btn btn-small text-size-btn" id="text-size-24" onclick="setTextSize(24)">S</button>
            <button class="side-btn btn-small text-size-btn" id="text-size-34" onclick="setTextSize(34)">M</button>
            <button class="side-btn btn-small text-size-btn" id="text-size-48" onclick="setTextSize(48)">L</button>
        </div>
    </div>

    <div class="sidebar-divider"></div>

    <div id="color-grid"></div>

    <div class="sidebar-divider"></div>

    <button class="side-btn btn-small" onclick="setBoardSize(2)" id="size-2">•</button>
    <button class="side-btn btn-small" onclick="setBoardSize(8)" id="size-8">●</button>
    <button class="side-btn btn-small" onclick="setBoardSize(20)" id="size-20">⬤</button>
    <button class="side-btn" id="btn-dashed" onclick="toggleDashed()" title="Gestrichelte Linie">┅</button>
    <button class="side-btn" id="btn-eraser" onclick="toggleEraser()" title="Radierer">🧽</button>

    <div class="sidebar-divider"></div>

    <button class="side-btn" onclick="performUndo()" title="Rückgängig">↩️</button>
    <button class="side-btn" onclick="clearBoard()" title="Tinte löschen">🗑️</button>
</div>

<div id="menu">
    <button onclick="createWidget('timer', {isNew:true})">⏲️ Eieruhr</button>
    <button onclick="createWidget('wheel', {isNew:true})">🎡 Glücksrad</button>
    <button onclick="createWidget('qr', {isNew:true})">🔗 QR-Code</button>
    <button onclick="createWidget('image', {isNew:true})">🖼️ Bild</button>
</div>

<div id="settings-overlay" class="modal-overlay hidden">
    <div id="settings-modal">
        <div class="modal-header">
            <span>⚙️ Einstellungen</span>
            <span class="header-icon" onclick="closeSettings()">×</span>
        </div>
        <div class="modal-body">
            <h3>Speichern</h3>
            <button class="settings-row" id="btn-save-row" onclick="saveBoard()">💾 Lokal speichern</button>
            <button class="settings-row" onclick="exportBoardFile()">⬇️ Speichern unter (Datei)</button>
            <button class="settings-row" onclick="triggerImport()">⬆️ Datei öffnen</button>

            <h3>Anzeige</h3>
            <div class="zoom-row">
                <label>Größe der Bedienelemente <span id="zoom-value">100%</span></label>
                <input type="range" id="zoom-range" min="70" max="140" step="5" value="100" oninput="setUIZoom(this.value)">
            </div>

            <h3>Geodreieck</h3>
            <div class="zoom-row">
                <label>Größe des Geodreiecks <span id="geo-scale-value">100%</span></label>
                <input type="range" id="geo-scale-range" min="50" max="200" step="10" value="100" oninput="setGeoScale(this.value)">
            </div>

            <h3>Lineal</h3>
            <div class="zoom-row">
                <label>Länge des Lineals <span id="ruler-len-value">20cm</span></label>
                <input type="range" id="ruler-len-range" min="5" max="50" step="0.5" value="20" oninput="setRulerLen(this.value)">
            </div>
            <div class="zoom-row">
                <label>Größe des Lineals <span id="ruler-scale-value">100%</span></label>
                <input type="range" id="ruler-scale-range" min="50" max="200" step="10" value="100" oninput="setRulerScale(this.value)">
            </div>

            <h3>Hintergrund der Tafel</h3>
            <div class="bg-type-row">
                <button class="settings-row bg-type-btn" data-bgtype="none" onclick="setBgType('none')">Keins</button>
                <button class="settings-row bg-type-btn" data-bgtype="kariert" onclick="setBgType('kariert')">Kariert</button>
                <button class="settings-row bg-type-btn" data-bgtype="liniert" onclick="setBgType('liniert')">Liniert</button>
            </div>
            <div class="zoom-row">
                <label>Rastergröße <span id="grid-size-value">30px</span></label>
                <input type="range" id="grid-size-range" min="15" max="80" step="5" value="30" oninput="setGridSize(this.value)">
            </div>

            <h3>Eingabe</h3>
            <div class="zoom-row" style="flex-direction:row; align-items:center; justify-content:space-between;">
                <label style="margin:0;">Nur Apple Pencil zeichnet<br><span style="opacity:0.6; font-weight:normal;">(Handballenschutz)</span></label>
                <input type="checkbox" id="pen-only-toggle" onchange="setPenOnly(this.checked)" style="width:22px; height:22px;">
            </div>
        </div>
    </div>
</div>

<div id="workspace">
    <div id="board-area">
        <div id="bg-pattern"></div>
        <canvas id="board-canvas" class="active"></canvas>
        <div id="tools-layer"></div>
        <div id="text-layer"></div>
    </div>
</div>

<div id="sidebar-right" class="side-panel">
    <button class="side-btn btn-add" onclick="toggleMenu()" title="Objekt hinzufügen">+</button>
    <div class="sidebar-divider"></div>
    <div id="kindergarten"></div>
    <div class="sidebar-divider"></div>
    <div id="page-tabs-vertical">
        <button id="add-page-btn" class="side-btn btn-small" onclick="addPage()" title="Neue Tafel">+ Tafel</button>
        <div id="page-tabs-list"></div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="side-btn" id="btn-sound-test" onclick="testAudio()" title="Ton &amp; Sprache aktivieren (lautlos)">🔊</button>
    <button class="side-btn btn-save" onclick="openSettings()" title="Einstellungen">⚙️</button>
    <input type="file" id="import-file-input" accept="application/json" style="display:none" onchange="importBoardFile(this)">
</div>

<script>
    let g_theme = 'sepia';
    let timers = {};
    let wheelData = {};
    const icons = { timer: '⏲️', wheel: '🎡', qr: '🔗', image: '🖼️' };
    const palette = ['#ffffff', '#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#000000'];
    const STORAGE_KEY = 'kzb-board-state-v1';

    let audioCtx = null;
    let alarmBeepInterval = null;

    function ensureAudioCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }
    function playBeepOnce() {
        const ac = ensureAudioCtx();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ac.currentTime);
        gain.gain.setValueAtTime(0.0001, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.5, ac.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.35);
        osc.connect(gain); gain.connect(ac.destination);
        osc.start();
        osc.stop(ac.currentTime + 0.4);
    }
    function startAlarmSound() {
        stopAlarmSound();
        playBeepOnce();
        alarmBeepInterval = setInterval(playBeepOnce, 600);
    }
    function stopAlarmSound() {
        if (alarmBeepInterval) { clearInterval(alarmBeepInterval); alarmBeepInterval = null; }
    }

    function initBoard() {
        ensureAudioCtx();
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const warm = new SpeechSynthesisUtterance('.');
            warm.volume = 0;
            window.speechSynthesis.speak(warm);
        }
        document.getElementById('start-overlay').style.display = 'none';
        resizeBoardCanvas();
    }

    function testAudio() {
        const ac = ensureAudioCtx();
        try {
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            gain.gain.value = 0.00001; // technisch aktiv, aber praktisch unhörbar
            osc.frequency.value = 440;
            osc.connect(gain); gain.connect(ac.destination);
            osc.start();
            osc.stop(ac.currentTime + 0.05);
        } catch (e) { /* ignore */ }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.resume();
            window.speechSynthesis.cancel();
            const warm = new SpeechSynthesisUtterance('.');
            warm.volume = 0;
            window.speechSynthesis.speak(warm);
        }
        flashSideButton('btn-sound-test');
    }

    let mode = 'stift';
    let boardPen = { color: '#ffffff', size: 8, eraser: false, dashed: false };
    let penOnlyMode = true;
    const canvas = document.getElementById('board-canvas');
    const ctx = canvas.getContext('2d');
    const boardArea = document.getElementById('board-area');
    const textLayer = document.getElementById('text-layer');
    let logicalW = 0, logicalH = 0;

    function buildColorGrid() {
        const grid = document.getElementById('color-grid');
        grid.innerHTML = palette.map(c =>
            `<div class="color-swatch" data-c="${c}" style="background:${c}" onclick="setBoardColor('${c}')"></div>`
        ).join('');
        updateColorGridUI();
    }
    function updateColorGridUI() {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s.getAttribute('data-c') === boardPen.color));
    }
    function setBoardColor(c) { boardPen.color = c; boardPen.eraser = false; updateColorGridUI(); updateEraserUI(); }
    function setBoardSize(s) {
        boardPen.size = s;
        document.querySelectorAll('#size-2, #size-8, #size-20').forEach(b => b.classList.remove('tool-active'));
        document.getElementById('size-' + s).classList.add('tool-active');
    }
    function toggleEraser() { boardPen.eraser = !boardPen.eraser; updateEraserUI(); }
    function updateEraserUI() { document.getElementById('btn-eraser').classList.toggle('tool-active', boardPen.eraser); }
    function toggleDashed() { boardPen.dashed = !boardPen.dashed; document.getElementById('btn-dashed').classList.toggle('tool-active', boardPen.dashed); }

    function clearBoard() {
        if (confirm('Tinte auf dieser Tafel wirklich löschen? (Objekte und Notizen bleiben erhalten)')) {
            pushUndoSnapshot();
            ctx.clearRect(0, 0, logicalW, logicalH);
        }
    }

    function setMode(m) {
        mode = m;
        document.getElementById('mode-stift').classList.toggle('mode-active', m === 'stift');
        document.getElementById('mode-linie').classList.toggle('mode-active', m === 'linie');
        document.getElementById('mode-text').classList.toggle('mode-active', m === 'text');
        document.getElementById('mode-hand').classList.toggle('mode-active', m === 'hand');
        canvas.classList.toggle('active', m === 'stift' || m === 'linie');
        if (m !== 'text') document.getElementById('text-submenu').classList.add('hidden');
    }

    function onTextModeClick() {
        if (mode === 'text') {
            document.getElementById('text-submenu').classList.toggle('hidden');
        } else {
            setMode('text');
            document.getElementById('text-submenu').classList.remove('hidden');
        }
    }

    function resizeBoardCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const snapshot = canvas.width && canvas.height ? canvas.toDataURL() : null;
        logicalW = boardArea.offsetWidth; logicalH = boardArea.offsetHeight;
        canvas.width = Math.round(logicalW * dpr);
        canvas.height = Math.round(logicalH * dpr);
        canvas.style.width = logicalW + 'px';
        canvas.style.height = logicalH + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (snapshot) {
            const img = new Image();
            img.onload = () => {
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(img, 0, 0, logicalW, logicalH);
            };
            img.src = snapshot;
        }
        undoStack = []; // Größe geändert -> alte Snapshots passen nicht mehr
    }
    window.addEventListener('resize', resizeBoardCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeBoardCanvas, 200));

    // ---------- Rückgängig (Undo) ----------
    let undoStack = [];
    const MAX_UNDO = 20;
    function pushUndoSnapshot() {
        try {
            const snap = ctx.getImageData(0, 0, canvas.width, canvas.height);
            undoStack.push(snap);
            if (undoStack.length > MAX_UNDO) undoStack.shift();
        } catch (e) { /* ignore */ }
    }
    function performUndo() {
        if (undoStack.length === 0) return;
        const snap = undoStack.pop();
        ctx.putImageData(snap, 0, 0);
    }

    let drawing = false;
    let activePointerId = null;
    let lineStartPos = null;
    let lineSnapshot = null;
    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        return { x: e.clientX - r.left, y: e.clientY - r.top };
    }
    canvas.addEventListener('pointerdown', (e) => {
        if (mode !== 'stift' && mode !== 'linie') return;
        if (drawing) return; // schon eine Berührung aktiv -> weitere (z.B. Handballen) ignorieren
        if (penOnlyMode && e.pointerType === 'touch') return; // nur Apple Pencil (und Maus zum Testen) zeichnet
        e.preventDefault();
        drawing = true;
        activePointerId = e.pointerId;
        const p = getPos(e);
        pushUndoSnapshot();
        if (mode === 'linie') {
            lineStartPos = p;
            lineSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        } else {
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
        }
        canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', (e) => {
        if (!drawing || e.pointerId !== activePointerId) return;
        e.preventDefault();
        const p = getPos(e);
        ctx.globalCompositeOperation = boardPen.eraser ? 'destination-out' : 'source-over';
        ctx.strokeStyle = boardPen.eraser ? 'rgba(0,0,0,1)' : boardPen.color;
        ctx.lineWidth = boardPen.eraser ? boardPen.size * 3 : boardPen.size;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.setLineDash((boardPen.dashed && !boardPen.eraser) ? [boardPen.size * 2.2, boardPen.size * 1.6] : []);
        if (mode === 'linie') {
            ctx.putImageData(lineSnapshot, 0, 0);
            ctx.beginPath();
            ctx.moveTo(lineStartPos.x, lineStartPos.y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        } else {
            ctx.lineTo(p.x, p.y); ctx.stroke();
        }
    });
    function endStroke(e) {
        if (e.pointerId === activePointerId) {
            drawing = false; activePointerId = null; lineStartPos = null; lineSnapshot = null;
            ctx.setLineDash([]);
        }
    }
    canvas.addEventListener('pointerup', endStroke);
    canvas.addEventListener('pointercancel', endStroke);

    // Zusätzliche Absicherung: Safaris native Auswahl-/Lupen-Geste bei langsamen
    // Berührungen oder einer zweiten gleichzeitigen Berührung komplett unterbinden
    canvas.addEventListener('touchstart', (e) => { if (mode === 'stift' || mode === 'linie') e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { if (mode === 'stift' || mode === 'linie') e.preventDefault(); }, { passive: false });

    let noteCounter = 0;
    let textStyle = { bold: false, italic: false, size: 34 };

    function getFocusedNoteContent() {
        const el = document.activeElement;
        return (el && el.classList && el.classList.contains('note-content')) ? el : null;
    }
    function toggleTextBold() {
        textStyle.bold = !textStyle.bold;
        updateTextSubmenuUI();
        const el = getFocusedNoteContent();
        if (el) el.style.fontWeight = textStyle.bold ? 'bold' : 'normal';
    }
    function toggleTextItalic() {
        textStyle.italic = !textStyle.italic;
        updateTextSubmenuUI();
        const el = getFocusedNoteContent();
        if (el) el.style.fontStyle = textStyle.italic ? 'italic' : 'normal';
    }
    function setTextSize(px) {
        textStyle.size = px;
        updateTextSubmenuUI();
        const el = getFocusedNoteContent();
        if (el) el.style.fontSize = px + 'px';
    }
    function updateTextSubmenuUI() {
        document.getElementById('text-bold-btn').classList.toggle('tool-active', textStyle.bold);
        document.getElementById('text-italic-btn').classList.toggle('tool-active', textStyle.italic);
        document.querySelectorAll('.text-size-btn').forEach(b => b.classList.remove('tool-active'));
        const match = document.getElementById('text-size-' + textStyle.size);
        if (match) match.classList.add('tool-active');
    }

    boardArea.addEventListener('pointerdown', (e) => {
        if (mode !== 'text') return;
        if (e.target.closest('.widget') || e.target.closest('.text-note') || e.target.closest('#board-canvas') || e.target.closest('.tool-el')) return;
        const r = boardArea.getBoundingClientRect();
        createTextNote(e.clientX - r.left, e.clientY - r.top, { focus: true });
    });

    function createTextNote(x, y, config = {}) {
        const id = config.id || 'note-' + (Date.now() + (noteCounter++));
        const color = config.color || boardPen.color;
        const fontSize = config.fontSize || textStyle.size;
        const bold = config.bold !== undefined ? config.bold : textStyle.bold;
        const italic = config.italic !== undefined ? config.italic : textStyle.italic;
        const note = document.createElement('div');
        note.className = 'text-note';
        note.id = id;
        note.style.left = (config.x !== undefined ? config.x : x) + 'px';
        note.style.top = (config.y !== undefined ? config.y : y) + 'px';
        const styleAttr = `color:${color}; font-size:${fontSize}px; font-weight:${bold ? 'bold' : 'normal'}; font-style:${italic ? 'italic' : 'normal'};`;
        note.innerHTML = `
            <div class="note-handle" data-note-drag="${id}">⠿</div>
            <div class="note-delete" onclick="document.getElementById('${id}').remove()">×</div>
            <div class="note-content" contenteditable="true" spellcheck="false" style="${styleAttr}">${config.text || ''}</div>`;
        textLayer.appendChild(note);
        dragNoteHandle(note.querySelector('.note-handle'), note);
        if (config.focus) setTimeout(() => note.querySelector('.note-content').focus(), 30);
        return note;
    }

    function dragNoteHandle(handle, note) {
        handle.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            handle.setPointerCapture(e.pointerId);
            const sX = e.clientX - note.offsetLeft, sY = e.clientY - note.offsetTop;
            const move = (m) => { note.style.left = (m.clientX - sX) + 'px'; note.style.top = (m.clientY - sY) + 'px'; };
            const stop = () => { handle.removeEventListener('pointermove', move); handle.removeEventListener('pointerup', stop); };
            handle.addEventListener('pointermove', move);
            handle.addEventListener('pointerup', stop);
        });
    }

    function toggleMenu() { const m = document.getElementById('menu'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
    function toggleSettings(id) { document.getElementById(id).classList.toggle('show-settings'); }

    function focusW(id) {
        document.querySelectorAll('.widget').forEach(w => w.style.zIndex = 10);
        const active = document.getElementById(id);
        if (active) active.style.zIndex = 100;
    }

    function toggleFullsize(id) {
        document.getElementById(id).classList.toggle('fullsize');
        const kg = document.getElementById('kg-btn-' + id);
        if (kg) kg.classList.toggle('fullsize', document.getElementById(id).classList.contains('fullsize'));
    }

    function createWidget(type, config = {}) {
        const id = config.id || 'w-' + Date.now() + Math.floor(Math.random() * 1000);
        const theme = config.theme || g_theme;
        const w = document.createElement('div');
        w.className = `widget theme-${theme}`;
        w.id = id;
        w.style.left = config.x || '120px';
        w.style.top = config.y || '50px';
        w.style.width = config.w || '340px';
        w.style.height = config.h || '420px';
        w.setAttribute('data-type', type);
        w.style.zIndex = 10;

        let inner = '';
        if (type === 'image') {
            inner = `<div class="settings-panel"><input type="text" placeholder="Bild-URL..." onchange="updateImg('${id}', this.value)" value="${config.val || ''}" style="width:100%"></div>
                     <img id="img-${id}" class="img-display" src="${config.val || 'https://via.placeholder.com/300?text=Bild+URL'}">`;
        } else if (type === 'timer') {
            let tConf = { mode: '1', text: '', sec: 300 };
            if (config.val) { try { tConf = Object.assign(tConf, JSON.parse(config.val)); } catch (e) {} }
            inner = `
                <div class="settings-panel">
                    <select id="t-mode-${id}">
                        <option value="1" ${tConf.mode == '1' ? 'selected' : ''}>Nur Klingeln</option>
                        <option value="2" ${tConf.mode == '2' ? 'selected' : ''}>Klingeln + Ansage</option>
                    </select>
                    <input type="text" id="t-text-${id}" placeholder="Ansagetext..." value="${tConf.text || ''}" style="width:100%; margin-top:5px;">
                </div>
                <div class="timer-display" id="t-disp-${id}">00:00</div>
                <button class="ctrl-btn alarm-stop-btn" id="t-stop-${id}" onclick="stopAlarm('${id}')">ALARM STOPPEN</button>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button class="ctrl-btn" onclick="adjTimer('${id}', -60)">-1m</button>
                    <button class="ctrl-btn" onclick="adjTimer('${id}', 60)">+1m</button>
                    <button class="ctrl-btn" onclick="runTimer('${id}')">▶️</button>
                    <button class="ctrl-btn" onclick="pauseTimer('${id}')">⏸️</button>
                </div>`;
            timers[id] = { sec: tConf.sec !== undefined ? tConf.sec : 300, interval: null };
        } else if (type === 'wheel') {
            let wConf = { names: 'Anna, Tom, Lisa', mode: 'keep' };
            if (config.val) { try { wConf = Object.assign(wConf, JSON.parse(config.val)); } catch (e) { wConf.names = config.val; } }
            inner = `<div class="winner-overlay" id="winner-overlay-${id}"><h1 id="winner-name-${id}"></h1><button class="ctrl-btn" onclick="closeWinner('${id}')">OK</button></div>
                     <div class="wheel-wrap"><canvas class="wheel-canvas" id="canvas-wheel-${id}"></canvas></div>
                     <div class="settings-panel">
                        <input type="text" id="wheel-names-${id}" onchange="initWheel('${id}')" value="${wConf.names}" style="width:100%">
                        <select id="wheel-mode-${id}">
                            <option value="keep" ${wConf.mode === 'keep' ? 'selected' : ''}>Behalten</option>
                            <option value="remove" ${wConf.mode === 'remove' ? 'selected' : ''}>Einmal</option>
                        </select>
                        <button class="ctrl-btn" onclick="initWheel('${id}')" style="margin-top:5px">Reset Liste</button>
                     </div>
                     <button class="ctrl-btn" style="width:100%; background:var(--accent); color:white;" onclick="spinWheel('${id}')">DREHEN</button>`;
        } else if (type === 'qr') {
            inner = `<div class="settings-panel"><input type="text" placeholder="URL..." onchange="updateQR('${id}', this.value)" value="${config.val || ''}" style="width:100%"></div><img id="qr-${id}" style="width:100%" src="${config.val ? 'https://api.qrserver.com/v1/create-qr-code/?data=' + encodeURIComponent(config.val) : ''}">`;
        }

        w.innerHTML = `
            <div class="widget-header" data-drag="${id}">
                <span>${icons[type]}</span>
                <div class="header-controls">
                    <span class="header-icon" title="Vollbild" onclick="toggleFullsize('${id}')">⛶</span>
                    <span class="header-icon" onclick="toggleSettings('${id}')">⚙️</span>
                    <span class="header-icon" onclick="toggleTheme('${id}')">🌓</span>
                    <span class="header-icon" onclick="remW('${id}')">×</span>
                </div>
            </div>
            <div class="widget-content">${inner}</div>
            <div class="resizer" data-resize="${id}"></div>`;

        boardArea.appendChild(w);
        addToKindergarten(id, type);
        bindWidgetDrag(w.querySelector('[data-drag]'), w);
        bindWidgetResize(w.querySelector('[data-resize]'), w);
        w.addEventListener('pointerdown', () => focusW(id));

        if (type === 'wheel') setTimeout(() => initWheel(id), 100);
        if (type === 'timer') updateTDisp(id);
        if (config.fullsize) { w.classList.add('fullsize'); const kg = document.getElementById('kg-btn-' + id); if (kg) kg.classList.add('fullsize'); }
        focusW(id);
        if (config.isNew) toggleMenu();
    }

    function bindWidgetDrag(header, w) {
        header.addEventListener('pointerdown', (e) => {
            if (w.classList.contains('fullsize') || e.target.closest('.header-controls') || e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
            e.preventDefault();
            focusW(w.id);
            header.setPointerCapture(e.pointerId);
            const sX = e.clientX - w.offsetLeft, sY = e.clientY - w.offsetTop;
            const move = (m) => { w.style.left = (m.clientX - sX) + 'px'; w.style.top = (m.clientY - sY) + 'px'; };
            const stop = () => { header.removeEventListener('pointermove', move); header.removeEventListener('pointerup', stop); };
            header.addEventListener('pointermove', move);
            header.addEventListener('pointerup', stop);
        });
    }
    function bindWidgetResize(handle, w) {
        handle.addEventListener('pointerdown', (e) => {
            if (w.classList.contains('fullsize')) return;
            e.preventDefault();
            handle.setPointerCapture(e.pointerId);
            const sW = w.offsetWidth, sH = w.offsetHeight, sX = e.clientX, sY = e.clientY;
            const move = (m) => { w.style.width = (sW + (m.clientX - sX)) + 'px'; w.style.height = (sH + (m.clientY - sY)) + 'px'; };
            const stop = () => { handle.removeEventListener('pointermove', move); handle.removeEventListener('pointerup', stop); };
            handle.addEventListener('pointermove', move);
            handle.addEventListener('pointerup', stop);
        });
    }

    function remW(id) { document.getElementById(id).remove(); const kg = document.getElementById('kg-btn-' + id); if (kg) kg.remove(); delete timers[id]; delete wheelData[id]; }
    function toggleTheme(id) { document.getElementById(id).classList.toggle('theme-sepia'); document.getElementById(id).classList.toggle('theme-dark'); }

    function adjTimer(id, d) { timers[id].sec = Math.max(0, timers[id].sec + d); updateTDisp(id); }
    function updateTDisp(id) { let m = Math.floor(timers[id].sec / 60), s = timers[id].sec % 60; document.getElementById('t-disp-' + id).innerText = `${m}:${s < 10 ? '0' : ''}${s}`; }

    function runTimer(id) {
        if (timers[id].interval) return;
        timers[id].interval = setInterval(() => {
            if (timers[id].sec <= 0) {
                clearInterval(timers[id].interval);
                timers[id].interval = null;
                startAlarmSequence(id);
            } else { timers[id].sec--; updateTDisp(id); }
        }, 1000);
    }
    function pauseTimer(id) { clearInterval(timers[id].interval); timers[id].interval = null; }

    function speakAnnouncement(text) {
        if (!('speechSynthesis' in window)) return;
        try {
            window.speechSynthesis.resume();
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'de-DE';
            const voices = window.speechSynthesis.getVoices();
            const deVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('de'));
            if (deVoice) msg.voice = deVoice;
            window.speechSynthesis.speak(msg);
        } catch (e) { console.error('Sprachausgabe fehlgeschlagen', e); }
    }

    function startAlarmSequence(id) {
        startAlarmSound();
        document.getElementById('t-stop-' + id).style.display = 'block';
        if (document.getElementById('t-mode-' + id).value === "2") {
            const txt = document.getElementById('t-text-' + id).value || "Die Zeit ist abgelaufen";
            speakAnnouncement(txt);
        }
    }
    function stopAlarm(id) {
        stopAlarmSound();
        window.speechSynthesis.cancel();
        document.getElementById('t-stop-' + id).style.display = 'none';
    }

    function updateImg(id, url) { document.getElementById('img-' + id).src = url; }
    function updateQR(id, v) { document.getElementById('qr-' + id).src = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(v)}`; }

    function addToKindergarten(id, type) {
        const b = document.createElement('button'); b.className = 'side-btn btn-parked active'; b.id = 'kg-btn-' + id; b.innerHTML = icons[type];
        b.onclick = () => {
            const w = document.getElementById(id);
            if (w.classList.contains('hidden')) { w.classList.remove('hidden'); b.classList.add('active'); focusW(id); }
            else { w.classList.add('hidden'); b.classList.remove('active'); }
        };
        document.getElementById('kindergarten').appendChild(b);
    }

    function initWheel(id) {
        const input = document.getElementById('wheel-names-' + id).value;
        const names = input.split(',').map(n => n.trim()).filter(n => n);
        wheelData[id] = { angle: 0, currentNames: [...names] };
        drawWheel(id);
    }
    function drawWheel(id) {
        const names = wheelData[id].currentNames; const c = document.getElementById('canvas-wheel-' + id); if (!c) return;
        const ctx2 = c.getContext('2d'); c.width = 800; c.height = 800;
        if (names.length === 0) { ctx2.clearRect(0, 0, 800, 800); return; }
        const arc = (Math.PI * 2) / names.length;
        names.forEach((n, i) => {
            ctx2.beginPath(); ctx2.fillStyle = `hsl(${i * (360 / names.length)}, 70%, 60%)`; ctx2.moveTo(400, 400); ctx2.arc(400, 400, 380, i * arc, (i + 1) * arc); ctx2.fill();
            ctx2.save(); ctx2.translate(400, 400); ctx2.rotate(i * arc + arc / 2); ctx2.fillStyle = "white"; ctx2.font = "bold 30px Arial"; ctx2.fillText(n.substring(0, 12), 160, 10); ctx2.restore();
        });
    }
    function spinWheel(id) {
        if (wheelData[id].currentNames.length === 0) return;
        const extra = 1800 + Math.random() * 2000; wheelData[id].angle += extra;
        document.getElementById('canvas-wheel-' + id).style.transform = `rotate(${wheelData[id].angle}deg)`;
        setTimeout(() => {
            const deg = wheelData[id].angle % 360; const idx = Math.floor(((360 - deg + 90) % 360) / (360 / wheelData[id].currentNames.length));
            const winner = wheelData[id].currentNames[idx]; document.getElementById('winner-name-' + id).innerText = winner; document.getElementById('winner-overlay-' + id).style.display = 'flex';
            if (document.getElementById('wheel-mode-' + id).value === 'remove') {
                wheelData[id].currentNames.splice(idx, 1);
                setTimeout(() => drawWheel(id), 500);
            }
        }, 4100);
    }
    function closeWinner(id) { document.getElementById('winner-overlay-' + id).style.display = 'none'; }

    // ---------- Geodreieck & Lineal ----------
    const PX_PER_CM = 37.8;
    let toolCounter = 0;
    let rulerLenCm = 20;
    let rulerScalePct = 100;

    function buildRulerSVG(lenCm, scalePct) {
        const scale = scalePct / 100;
        const wPx = Math.max(40, Math.round(lenCm * PX_PER_CM));
        const h = 70;
        let ticks = '';
        const stepsHalfCm = Math.round(lenCm * 2);
        for (let i = 0; i <= stepsHalfCm; i++) {
            const cm = i / 2;
            const x = Math.round(cm * PX_PER_CM);
            const isFullCm = Number.isInteger(cm);
            const tickH = isFullCm ? 26 : 14;
            ticks += `<line x1="${x}" y1="0" x2="${x}" y2="${tickH}" stroke="#222" stroke-width="1.5"/>`;
            if (isFullCm) ticks += `<text x="${x + 2}" y="${tickH + 14}" font-size="12" fill="#222">${cm}</text>`;
        }
        return `<svg class="ruler-svg" width="${Math.round(wPx * scale)}" height="${Math.round(h * scale)}" viewBox="0 0 ${wPx} ${h}">
            <rect x="0" y="0" width="${wPx}" height="${h}" fill="rgba(255,247,220,0.88)" stroke="#333" stroke-width="2"/>
            ${ticks}
        </svg>`;
    }

    function createRuler(config = {}) {
        const id = config.id || 'ruler-' + (Date.now() + (toolCounter++));
        const el = document.createElement('div');
        el.className = 'tool-el ruler-el';
        el.id = id;
        el.style.left = (config.x !== undefined ? config.x : 150) + 'px';
        el.style.top = (config.y !== undefined ? config.y : 150) + 'px';
        el.style.setProperty('--rot', (config.rot || 0) + 'deg');
        el.dataset.rot = config.rot || 0;
        el.innerHTML = `
            <div class="rotatable">
                <div class="tool-drag" data-drag>⠿</div>
                <div class="tool-rotate-handle" data-rotate>⟲</div>
                <div class="ruler-body" id="body-${id}">${buildRulerSVG(rulerLenCm, rulerScalePct)}</div>
            </div>
            <div class="tool-del" onclick="removeTool('${id}')">×</div>`;
        document.getElementById('tools-layer').appendChild(el);
        bindToolDrag(el);
        bindToolRotate(el);
        if (config.isNew) toggleMenu();
        return el;
    }

    function rebuildAllRulers() {
        document.querySelectorAll('.ruler-el').forEach(el => {
            const body = el.querySelector('.ruler-body');
            if (body) body.innerHTML = buildRulerSVG(rulerLenCm, rulerScalePct);
        });
    }

    function buildGeoSVG() {
        let ticks = '';
        for (let cm = 0; cm <= 10; cm += 0.5) {
            const x = 40 + cm * 32;
            const full = Number.isInteger(cm);
            ticks += `<line x1="${x}" y1="200" x2="${x}" y2="${200 - (full ? 16 : 9)}" stroke="#222" stroke-width="1.2"/>`;
            if (full) ticks += `<text x="${x - 4}" y="185" font-size="10" fill="#222">${cm}</text>`;
        }
        let deg = '';
        for (let a = 0; a <= 180; a += 10) {
            const rad = (Math.PI * a) / 180;
            const r1 = 140, r2 = (a % 30 === 0) ? 122 : 130;
            const cx = 200, cy = 200;
            const x1 = cx - r1 * Math.cos(rad), y1 = cy - r1 * Math.sin(rad);
            const x2 = cx - r2 * Math.cos(rad), y2 = cy - r2 * Math.sin(rad);
            deg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#c0392b" stroke-width="1"/>`;
            if (a % 30 === 0) {
                const xl = cx - 108 * Math.cos(rad), yl = cy - 108 * Math.sin(rad);
                deg += `<text x="${xl}" y="${yl}" font-size="9" fill="#c0392b" text-anchor="middle">${a}</text>`;
            }
        }
        return `<svg class="geo-svg" width="400" height="200" viewBox="0 0 400 200">
            <polygon points="0,200 400,200 200,0" fill="rgba(180,222,255,0.38)" stroke="#1b3a57" stroke-width="2.5"/>
            ${ticks}
            <path d="M 60 200 A 140 140 0 0 1 340 200" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.6"/>
            ${deg}
        </svg>`;
    }
    const GEO_SVG_CACHE = buildGeoSVG();
    const GEO_PNG_FILENAME = 'geodreieck.png';

    function handleGeoImgError(imgEl) {
        const wrap = document.createElement('div');
        wrap.innerHTML = GEO_SVG_CACHE;
        imgEl.replaceWith(wrap.firstElementChild);
    }

    function createGeoDreieck(config = {}) {
        const id = config.id || 'geo-' + (Date.now() + (toolCounter++));
        const el = document.createElement('div');
        el.className = 'tool-el geo-el';
        el.id = id;
        el.style.left = (config.x !== undefined ? config.x : 200) + 'px';
        el.style.top = (config.y !== undefined ? config.y : 120) + 'px';
        el.style.setProperty('--rot', (config.rot || 0) + 'deg');
        el.dataset.rot = config.rot || 0;
        el.innerHTML = `
            <div class="rotatable">
                <div class="tool-drag" data-drag>⠿</div>
                <div class="tool-rotate-handle" data-rotate>⟲</div>
                <img class="geo-img" src="${GEO_PNG_FILENAME}" draggable="false" onerror="handleGeoImgError(this)">
            </div>
            <div class="tool-del" onclick="removeTool('${id}')">×</div>`;
        document.getElementById('tools-layer').appendChild(el);
        bindToolDrag(el);
        bindToolRotate(el);
        if (config.isNew) toggleMenu();
        return el;
    }

    function removeTool(id) { const el = document.getElementById(id); if (el) el.remove(); }

    function bindToolDrag(el) {
        const handle = el.querySelector('[data-drag]');
        handle.addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            handle.setPointerCapture(e.pointerId);
            const sX = e.clientX - el.offsetLeft, sY = e.clientY - el.offsetTop;
            const move = (m) => { el.style.left = (m.clientX - sX) + 'px'; el.style.top = (m.clientY - sY) + 'px'; };
            const stop = () => { handle.removeEventListener('pointermove', move); handle.removeEventListener('pointerup', stop); };
            handle.addEventListener('pointermove', move);
            handle.addEventListener('pointerup', stop);
        });
    }
    function bindToolRotate(el) {
        const handle = el.querySelector('[data-rotate]');
        handle.addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            handle.setPointerCapture(e.pointerId);
            const move = (m) => {
                const rect = el.getBoundingClientRect();
                const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
                const angle = Math.atan2(m.clientY - cy, m.clientX - cx) * 180 / Math.PI;
                const rot = Math.round(angle + 90);
                el.style.setProperty('--rot', rot + 'deg');
                el.dataset.rot = rot;
            };
            const stop = () => { handle.removeEventListener('pointermove', move); handle.removeEventListener('pointerup', stop); };
            handle.addEventListener('pointermove', move);
            handle.addEventListener('pointerup', stop);
        });
    }

    // ---------- Hintergrund (Kariert / Liniert) ----------
    function setBgType(type) {
        const layer = document.getElementById('bg-pattern');
        layer.classList.remove('bg-kariert', 'bg-liniert');
        if (type === 'kariert') layer.classList.add('bg-kariert');
        if (type === 'liniert') layer.classList.add('bg-liniert');
        localStorage.setItem('kzb-bg-type', type);
        document.querySelectorAll('.bg-type-btn').forEach(b => b.classList.toggle('mode-active', b.dataset.bgtype === type));
    }
    function setGridSize(val) {
        document.documentElement.style.setProperty('--grid-size', val + 'px');
        document.getElementById('grid-size-value').innerText = val + 'px';
        localStorage.setItem('kzb-bg-size', val);
    }
    function restoreBgSettings() {
        const type = localStorage.getItem('kzb-bg-type') || 'none';
        const size = localStorage.getItem('kzb-bg-size') || '30';
        setBgType(type);
        document.getElementById('grid-size-range').value = size;
        setGridSize(size);
    }
    function setGeoScale(val) {
        document.documentElement.style.setProperty('--geo-scale', val / 100);
        document.getElementById('geo-scale-value').innerText = val + '%';
        localStorage.setItem('kzb-geo-scale', val);
    }
    function restoreGeoScale() {
        const val = localStorage.getItem('kzb-geo-scale') || '100';
        document.getElementById('geo-scale-range').value = val;
        setGeoScale(val);
    }
    function setRulerLen(val) {
        rulerLenCm = parseFloat(val);
        document.getElementById('ruler-len-value').innerText = val + 'cm';
        localStorage.setItem('kzb-ruler-len', val);
        rebuildAllRulers();
    }
    function setRulerScale(val) {
        rulerScalePct = parseInt(val);
        document.getElementById('ruler-scale-value').innerText = val + '%';
        localStorage.setItem('kzb-ruler-scale', val);
        rebuildAllRulers();
    }
    function restoreRulerSettings() {
        const len = localStorage.getItem('kzb-ruler-len') || '20';
        const scale = localStorage.getItem('kzb-ruler-scale') || '100';
        document.getElementById('ruler-len-range').value = len;
        document.getElementById('ruler-scale-range').value = scale;
        setRulerLen(len);
        setRulerScale(scale);
    }

    // ---------- Zustand einer einzelnen Tafel (Widgets, Notizen, Tinte, Werkzeuge) ----------
    function gatherState() {
        const widgetData = [];
        document.querySelectorAll('.widget').forEach(w => {
            const t = w.getAttribute('data-type');
            let v = '';
            if (t === 'timer') {
                v = JSON.stringify({ mode: document.getElementById('t-mode-' + w.id).value, text: document.getElementById('t-text-' + w.id).value, sec: timers[w.id] ? timers[w.id].sec : 300 });
            } else if (t === 'wheel') {
                v = JSON.stringify({ names: document.getElementById('wheel-names-' + w.id).value, mode: document.getElementById('wheel-mode-' + w.id).value });
            } else {
                v = w.querySelector('input')?.value || '';
            }
            widgetData.push({ type: t, x: w.style.left, y: w.style.top, w: w.style.width, h: w.style.height, val: v, theme: w.classList.contains('theme-dark') ? 'dark' : 'sepia', fullsize: w.classList.contains('fullsize') });
        });
        const noteData = [];
        document.querySelectorAll('.text-note').forEach(n => {
            const content = n.querySelector('.note-content');
            noteData.push({
                id: n.id, x: parseInt(n.style.left), y: parseInt(n.style.top), text: content.innerHTML,
                color: content.style.color, fontSize: parseInt(content.style.fontSize),
                bold: content.style.fontWeight === 'bold', italic: content.style.fontStyle === 'italic'
            });
        });
        const rulerData = [];
        document.querySelectorAll('.ruler-el').forEach(r => {
            rulerData.push({ id: r.id, x: parseInt(r.style.left), y: parseInt(r.style.top), rot: parseInt(r.dataset.rot) || 0 });
        });
        const geoData = [];
        document.querySelectorAll('.geo-el').forEach(g => {
            geoData.push({ id: g.id, x: parseInt(g.style.left), y: parseInt(g.style.top), rot: parseInt(g.dataset.rot) || 0 });
        });
        return { widgets: widgetData, notes: noteData, rulers: rulerData, geos: geoData, ink: canvas.toDataURL('image/png') };
    }

    function restoreState(state) {
        (state.widgets || []).forEach(c => createWidget(c.type, c));
        (state.notes || []).forEach(n => createTextNote(n.x, n.y, n));
        (state.rulers || []).forEach(r => createRuler(r));
        (state.geos || []).forEach(g => createGeoDreieck(g));
        if (state.ink) {
            const img = new Image();
            img.onload = () => {
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(img, 0, 0, logicalW, logicalH);
            };
            img.src = state.ink;
        }
    }

    function clearWorkspaceForImport() {
        document.querySelectorAll('.widget').forEach(w => w.remove());
        document.getElementById('kindergarten').innerHTML = '';
        document.querySelectorAll('.text-note').forEach(n => n.remove());
        document.querySelectorAll('.ruler-el, .geo-el').forEach(t => t.remove());
        ctx.globalCompositeOperation = 'source-over';
        ctx.clearRect(0, 0, logicalW, logicalH);
        timers = {}; wheelData = {}; undoStack = [];
    }

    // ---------- Mehrere Tafeln (Seiten) ----------
    function defaultPage(name) { return { id: 'page-' + Date.now() + Math.floor(Math.random() * 1000), name: name || 'Tafel 1', state: { widgets: [], notes: [], rulers: [], geos: [], ink: null } }; }
    let pages = [defaultPage('Tafel 1')];
    let currentPageIndex = 0;

    function renderPageTabs() {
        const list = document.getElementById('page-tabs-list');
        list.innerHTML = '';
        pages.forEach((p, i) => {
            const tab = document.createElement('div');
            tab.className = 'page-tab' + (i === currentPageIndex ? ' active' : '');
            const label = document.createElement('span');
            label.className = 'tab-label'; label.innerText = p.name;
            label.onclick = () => switchToPage(i);
            label.ondblclick = () => renamePage(i);
            tab.appendChild(label);
            if (pages.length > 1) {
                const close = document.createElement('span');
                close.className = 'tab-close'; close.innerText = '×';
                close.onclick = (e) => { e.stopPropagation(); deletePage(i); };
                tab.appendChild(close);
            }
            list.appendChild(tab);
        });
    }

    function switchToPage(i) {
        if (i === currentPageIndex) return;
        pages[currentPageIndex].state = gatherState();
        clearWorkspaceForImport();
        currentPageIndex = i;
        restoreState(pages[i].state);
        renderPageTabs();
    }

    function addPage() {
        pages[currentPageIndex].state = gatherState();
        clearWorkspaceForImport();
        const p = defaultPage('Tafel ' + (pages.length + 1));
        pages.push(p);
        currentPageIndex = pages.length - 1;
        renderPageTabs();
    }

    function deletePage(i) {
        if (pages.length <= 1) { alert('Mindestens eine Tafel muss bestehen bleiben.'); return; }
        if (!confirm('Tafel "' + pages[i].name + '" wirklich löschen?')) return;
        const wasCurrent = (i === currentPageIndex);
        pages.splice(i, 1);
        if (wasCurrent) {
            currentPageIndex = Math.min(i, pages.length - 1);
            clearWorkspaceForImport();
            restoreState(pages[currentPageIndex].state);
        } else if (i < currentPageIndex) {
            currentPageIndex--;
        }
        renderPageTabs();
    }

    function renamePage(i) {
        const newName = prompt('Name der Tafel:', pages[i].name);
        if (newName && newName.trim()) { pages[i].name = newName.trim(); renderPageTabs(); }
    }

    // ---------- Gesamtes Dokument (alle Tafeln): Speichern / Export / Import ----------
    function gatherFullDocument() {
        pages[currentPageIndex].state = gatherState();
        return { pages: pages.map(p => ({ id: p.id, name: p.name, state: p.state })), currentPageIndex, savedAt: new Date().toISOString() };
    }

    function normalizeDocument(doc) {
        if (doc && doc.pages) return doc;
        return { pages: [{ name: 'Tafel 1', state: doc }], currentPageIndex: 0 };
    }

    function restoreFullDocument(doc) {
        clearWorkspaceForImport();
        pages = (doc.pages || []).map(p => ({ id: p.id || ('page-' + Date.now() + Math.random()), name: p.name || 'Tafel', state: p.state || { widgets: [], notes: [], rulers: [], geos: [], ink: null } }));
        if (pages.length === 0) pages = [defaultPage('Tafel 1')];
        currentPageIndex = Math.min(doc.currentPageIndex || 0, pages.length - 1);
        restoreState(pages[currentPageIndex].state);
        renderPageTabs();
    }

    function flashSideButton(id) {
        const b = document.getElementById(id); const original = b.innerHTML;
        b.innerHTML = '✅'; setTimeout(() => b.innerHTML = original, 900);
    }

    function saveBoard() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(gatherFullDocument()));
            flashSideButton('btn-save-row');
        } catch (e) {
            alert('Speichern fehlgeschlagen (evtl. zu wenig Speicherplatz): ' + e.message);
        }
    }

    function exportBoardFile() {
        const doc = gatherFullDocument();
        const blob = new Blob([JSON.stringify(doc)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
        a.href = url; a.download = `klassenzimmer-board-${stamp}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
    }

    function triggerImport() { document.getElementById('import-file-input').click(); }
    function importBoardFile(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const parsed = JSON.parse(e.target.result);
                if (confirm('Aktuelle Tafeln vorher als Datei sichern?\n\n„OK“ = Ja, zuerst sichern\n„Abbrechen“ = Nein, direkt überschreiben')) {
                    exportBoardFile();
                }
                restoreFullDocument(normalizeDocument(parsed));
            } catch (err) { alert('Öffnen fehlgeschlagen: ungültige Datei.'); }
            input.value = '';
        };
        reader.readAsText(file);
    }

    // ---------- Einstellungen: Modal & Zoom ----------
    const ZOOM_KEY = 'kzb-ui-zoom';
    const PEN_ONLY_KEY = 'kzb-pen-only';
    function openSettings() { document.getElementById('settings-overlay').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settings-overlay').classList.add('hidden'); }

    function setPenOnly(val) {
        penOnlyMode = val;
        localStorage.setItem(PEN_ONLY_KEY, val ? '1' : '0');
    }
    function restorePenOnly() {
        const saved = localStorage.getItem(PEN_ONLY_KEY);
        penOnlyMode = saved === null ? true : saved === '1';
        document.getElementById('pen-only-toggle').checked = penOnlyMode;
    }

    function setUIZoom(val) {
        const pct = parseInt(val);
        document.documentElement.style.setProperty('--ui-zoom', pct / 100);
        document.getElementById('zoom-value').innerText = pct + '%';
        localStorage.setItem(ZOOM_KEY, pct);
    }

    function restoreUIZoom() {
        const saved = localStorage.getItem(ZOOM_KEY);
        if (saved) {
            document.getElementById('zoom-range').value = saved;
            setUIZoom(saved);
        }
    }

    buildColorGrid();
    setBoardSize(8);
    updateTextSubmenuUI();
    restoreUIZoom();
    restorePenOnly();
    restoreGeoScale();
    restoreRulerSettings();
    restoreBgSettings();

    window.onload = () => {
        resizeBoardCanvas();
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                restoreFullDocument(normalizeDocument(JSON.parse(raw)));
            } else {
                renderPageTabs();
            }
        } catch (e) { console.error('Laden fehlgeschlagen', e); renderPageTabs(); }
    };
</script>
</body>
